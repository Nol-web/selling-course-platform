<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Global Seller Hub Builder</title>
  <style>
    :root {
      --bg: #f4f4f5;
      --panel: #ffffff;
      --ink: #0f1115;
      --muted: #6e737b;
      --line: #e8e8ea;
      --field: #fdfdfd;
      --soft: #f7f7f8;
      --blue: #3b6eea;
      --amber: #b77912;
      --green: #16823a;
      --gray: #9ca0a6;
      --chip-warn-bg: #fbf0df;
      --chip-warn: #b86d0c;
      --radius: 10px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .shell {
      width: min(1050px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 42px;
    }

    .top-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .board {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(14, 18, 24, 0.05);
    }

    .summary {
      padding: 28px 30px 30px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      border-bottom: 1px solid var(--line);
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .course-title {
      border: 0;
      padding: 0;
      min-width: min(520px, 100%);
      background: transparent;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--ink);
    }

    .course-title:focus,
    .chapter-title:focus,
    .lesson-title:focus {
      outline: 2px solid #d7e2ff;
      outline-offset: 4px;
      border-radius: 6px;
    }

    .summary-text {
      font-size: 20px;
      line-height: 1.35;
      font-weight: 800;
      letter-spacing: 0;
    }

    .status-line {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .status-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gray);
    }

    .dot.blue {
      background: var(--blue);
    }

    .dot.amber {
      background: var(--amber);
    }

    .dot.green {
      background: var(--green);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action {
      min-height: 48px;
      border-radius: 9px;
      background: var(--soft);
      padding: 0 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-weight: 800;
      white-space: nowrap;
    }

    .action.dark {
      background: #16191f;
      color: #fff;
    }

    .plus {
      font-size: 28px;
      line-height: 1;
      font-weight: 400;
    }

    .body {
      padding: 30px;
    }

    .course-fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field textarea,
    .field select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 10px;
      background: var(--field);
      color: var(--ink);
    }

    .field textarea {
      min-height: 76px;
      resize: vertical;
    }

    .wide {
      grid-column: span 2;
    }

    .full {
      grid-column: 1 / -1;
    }

    .chapter-list {
      display: grid;
      gap: 22px;
    }

    .chapter-add-row {
      margin-top: 22px;
      display: flex;
      justify-content: center;
    }

    .chapter {
      border-top: 1px solid #f0f0f1;
      padding-top: 30px;
    }

    .chapter:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .chapter-row {
      display: grid;
      grid-template-columns: 32px minmax(0, 1fr) 72px 38px;
      gap: 14px;
      align-items: center;
    }

    .drag {
      color: #7a7f87;
      font-size: 25px;
      line-height: 1;
      display: flex;
      justify-content: center;
    }

    .chapter-title-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      min-height: 48px;
      background: #fff;
      padding: 0 11px;
    }

    .chapter-title {
      border: 0;
      min-width: 0;
      padding: 0;
      height: 42px;
      background: transparent;
      font-size: 17px;
      color: var(--ink);
    }

    .chapter-progress {
      color: #555b65;
      font-size: 17px;
      white-space: nowrap;
    }

    .menu {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      color: #12151b;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .menu:hover,
    .mini:hover {
      background: var(--soft);
    }

    .lessons {
      display: grid;
      gap: 26px;
      margin: 28px 0 0 72px;
    }

    .lesson {
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .lesson-main {
      min-width: 0;
    }

    .lesson-title-line {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      margin-bottom: 7px;
    }

    .lesson-index {
      font-size: 17px;
      color: #12151b;
      white-space: nowrap;
    }

    .lesson-title {
      border: 0;
      padding: 0;
      min-width: 0;
      width: 100%;
      background: transparent;
      font-size: 17px;
      color: var(--ink);
    }

    .url-input {
      width: min(420px, 100%);
      border: 0;
      background: #f1f2f3;
      border-radius: 4px;
      min-height: 30px;
      padding: 0 9px;
      font-size: 13px;
      color: #333943;
    }

    .mini {
      width: 42px;
      height: 38px;
      border-radius: 10px;
      background: var(--soft);
      display: grid;
      place-items: center;
      font-size: 21px;
    }

    .add-lesson {
      margin: 4px 0 0 38px;
      min-height: 36px;
      border-radius: 8px;
      background: #f7f7f8;
      padding: 0 12px;
      color: #22262d;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .empty {
      margin-left: 72px;
      color: var(--muted);
      border: 1px dashed #d6d8dc;
      border-radius: 9px;
      padding: 18px;
      background: #fcfcfd;
    }

    .footer-tools {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      flex-wrap: wrap;
    }

    .file-input {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      background: #11151b;
      color: #fff;
      padding: 10px 14px;
      border-radius: 9px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 820px) {
      .summary {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .course-fields {
        grid-template-columns: 1fr;
      }

      .wide,
      .full {
        grid-column: auto;
      }

      .chapter-row {
        grid-template-columns: 28px minmax(0, 1fr) 54px 36px;
        gap: 8px;
      }

      .lessons,
      .empty {
        margin-left: 38px;
      }

      .lesson {
        grid-template-columns: 24px minmax(0, 1fr);
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: 100%;
        padding-top: 0;
      }

      .board {
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .summary,
      .body {
        padding-left: 18px;
        padding-right: 18px;
      }

      .status-line {
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <a class="top-link" href="index.html">← 공개 사이트로 돌아가기</a>
    <main class="board">
      <header class="summary">
        <div>
          <div class="title-row">
            <input class="course-title" id="courseTitle" aria-label="코스명">
          </div>
          <div class="summary-text" id="summaryText"></div>
          <div class="status-line" id="statusLine"></div>
        </div>
        <div class="toolbar">
          <button class="action" id="addChapterBtn"><span class="plus">+</span> 챕터 추가</button>
          <button class="action dark" id="exportPageBtn">강의 페이지 생성</button>
        </div>
      </header>

      <section class="body">
        <div class="course-fields">
          <label class="field">카테고리
            <input id="categoryInput">
          </label>
          <label class="field">난이도
            <select id="levelInput">
              <option>입문</option>
              <option>초급</option>
              <option>중급</option>
              <option>고급</option>
            </select>
          </label>
          <label class="field">페이지 파일명
            <input id="slugInput" placeholder="global-selling-start">
          </label>
          <label class="field wide">기술/주제 태그
            <input id="tagsInput" placeholder="마켓플레이스, 소싱, 물류">
          </label>
          <label class="field">예상 시간
            <input id="hoursInput" type="number" min="0" step="0.5">
          </label>
          <label class="field full">코스 설명
            <textarea id="descriptionInput"></textarea>
          </label>
        </div>

        <div class="chapter-list" id="chapterList"></div>
        <div class="chapter-add-row">
          <button class="action" id="addChapterBottomBtn"><span class="plus">+</span> 챕터 추가</button>
        </div>

        <div class="footer-tools">
          <button class="action" id="importBtn">불러오기</button>
          <button class="action" id="exportJsonBtn">JSON 내보내기</button>
        </div>
      </section>
    </main>
  </div>

  <input class="file-input" id="fileInput" type="file" accept="application/json,.json">
  <div class="toast" id="toast"></div>

  <script>
    const storageKey = "global-seller-hub-builder-v2";

    const state = {
      course: loadCourse()
    };

    const els = {
      courseTitle: document.getElementById("courseTitle"),
      summaryText: document.getElementById("summaryText"),
      statusLine: document.getElementById("statusLine"),
      addChapterBtn: document.getElementById("addChapterBtn"),
      addChapterBottomBtn: document.getElementById("addChapterBottomBtn"),
      exportPageBtn: document.getElementById("exportPageBtn"),
      categoryInput: document.getElementById("categoryInput"),
      levelInput: document.getElementById("levelInput"),
      slugInput: document.getElementById("slugInput"),
      tagsInput: document.getElementById("tagsInput"),
      hoursInput: document.getElementById("hoursInput"),
      descriptionInput: document.getElementById("descriptionInput"),
      chapterList: document.getElementById("chapterList"),
      importBtn: document.getElementById("importBtn"),
      exportJsonBtn: document.getElementById("exportJsonBtn"),
      fileInput: document.getElementById("fileInput"),
      toast: document.getElementById("toast")
    };

    function sampleCourse() {
      return {
        title: "글로벌 셀링 시작하기",
        category: "글로벌 셀링",
        level: "입문",
        slug: "global-selling-start",
        tags: "마켓플레이스, 소싱, 물류",
        hours: 2.4,
        description: "해외 판매를 처음 시작하는 셀러를 위해 준비사항, 가입 절차, 상품 리스팅, 운영 흐름을 정리한 코스입니다.",
        chapters: [
          {
            id: uid("chapter"),
            title: "Chapter1. 라자다 시작 전 준비사항",
            complete: 23,
            total: 40,
            lessons: [
              {
                id: uid("lesson"),
                title: "지금 라자다에 주목해야 되는 이유",
                duration: "10:29",
                status: "개선 필요",
                youtubeUrl: "",
                materialUrl: ""
              },
              {
                id: uid("lesson"),
                title: "첫릿길도 한 걸음부터, 라자다 가입 절차",
                duration: "04:25",
                status: "개선 필요",
                youtubeUrl: "",
                materialUrl: ""
              }
            ]
          }
        ]
      };
    }

    function uid(prefix) {
      return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
    }

    function loadCourse() {
      try {
        const saved = localStorage.getItem(storageKey);
        return saved ? JSON.parse(saved) : sampleCourse();
      } catch {
        return sampleCourse();
      }
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(state.course));
    }

    function saveAndRender() {
      save();
      render();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function slugify(value) {
      const slug = String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9가-힣]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return slug || "course-page";
    }

    function allLessons() {
      return state.course.chapters.flatMap(chapter => chapter.lessons);
    }

    function statusCounts() {
      const counts = { "검토 대기": 0, "검토 중": 0, "개선 필요": 0, "승인": 0 };
      allLessons().forEach((lesson) => {
        counts[lesson.status] = (counts[lesson.status] || 0) + 1;
      });
      return counts;
    }

    function totalMinutes() {
      return allLessons().reduce((sum, lesson) => {
        const parts = String(lesson.duration || "0").split(":").map(Number);
        if (parts.length === 2) return sum + (parts[0] || 0) + (parts[1] || 0) / 60;
        if (parts.length === 3) return sum + (parts[0] || 0) * 60 + (parts[1] || 0) + (parts[2] || 0) / 60;
        return sum;
      }, 0);
    }

    function formatDuration(minutes) {
      const rounded = Math.round(minutes);
      const hours = Math.floor(rounded / 60);
      const mins = rounded % 60;
      if (!hours) return `${mins}분`;
      return `${hours}시간 ${mins}분`;
    }

    function syncFields() {
      els.courseTitle.value = state.course.title;
      els.categoryInput.value = state.course.category;
      els.levelInput.value = state.course.level;
      els.slugInput.value = state.course.slug;
      els.tagsInput.value = state.course.tags;
      els.hoursInput.value = state.course.hours;
      els.descriptionInput.value = state.course.description;
    }

    function render() {
      syncFields();
      renderSummary();
      els.chapterList.innerHTML = state.course.chapters.length
        ? state.course.chapters.map(renderChapter).join("")
        : `<div class="empty">챕터를 추가하세요.</div>`;
    }

    function renderSummary() {
      const lessons = allLessons();
      const counts = statusCounts();
      els.summaryText.textContent = `챕터${state.course.chapters.length}개 · 강의${lessons.length}개 · 총 ${formatDuration(totalMinutes())}`;
      els.statusLine.innerHTML = `
        <span class="status-item"><span class="dot"></span> 검토 대기 ${counts["검토 대기"] || 0}개</span>
        <span class="status-item"><span class="dot blue"></span> 검토 중 ${counts["검토 중"] || 0}개</span>
        <span class="status-item"><span class="dot amber"></span> 개선 필요 ${counts["개선 필요"] || 0}개</span>
        <span class="status-item"><span class="dot green"></span> 승인 ${counts["승인"] || 0}개</span>
      `;
    }

    function renderChapter(chapter, chapterIndex) {
      return `
        <article class="chapter" data-chapter-id="${chapter.id}">
          <div class="chapter-row">
            <div class="drag">≡</div>
            <div class="chapter-title-wrap">
              <input class="chapter-title" value="${escapeHtml(chapter.title)}" data-chapter-field="title" aria-label="챕터명">
              <span class="chapter-progress">${escapeHtml(chapter.complete || 0)}/${escapeHtml(chapter.total || 0)}</span>
            </div>
            <button class="menu" data-action="add-lesson" title="강의 추가">+</button>
            <button class="menu" data-action="delete-chapter" title="챕터 삭제">…</button>
          </div>

          <div class="lessons">
            ${chapter.lessons.length ? chapter.lessons.map((lesson, lessonIndex) => renderLesson(chapter.id, lesson, chapterIndex, lessonIndex)).join("") : ""}
          </div>
          ${chapter.lessons.length ? "" : `<div class="empty">아직 강의가 없습니다.</div>`}
          <button class="add-lesson" data-action="add-lesson"><span class="plus">+</span> 강의 추가</button>
        </article>
      `;
    }

    function statusClass(status) {
      if (status === "승인") return "done";
      if (status === "검토 중") return "review";
      if (status === "검토 대기") return "wait";
      return "";
    }

    function renderLesson(chapterId, lesson, chapterIndex, lessonIndex) {
      const number = lessonIndex + 1;
      return `
        <div class="lesson" data-lesson-id="${lesson.id}">
          <div class="drag">≡</div>
          <div class="lesson-main">
            <div class="lesson-title-line">
              <span class="lesson-index">${number}.</span>
              <input class="lesson-title" value="${escapeHtml(lesson.title)}" data-lesson-field="title" aria-label="강의명">
            </div>
            <input class="url-input" value="${escapeHtml(lesson.youtubeUrl)}" placeholder="유튜브 링크" data-lesson-field="youtubeUrl" aria-label="유튜브 링크">
          </div>
        </div>
      `;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function updateCourseField(field, value) {
      state.course[field] = field === "hours" ? Number(value || 0) : value;
      save();
    }

    function addChapter() {
      const nextNumber = state.course.chapters.length + 1;
      const chapterId = uid("chapter");
      state.course.chapters.push({
        id: chapterId,
        title: `Chapter${nextNumber}. 새 챕터`,
        complete: 0,
        total: 1,
        lessons: [
          {
            id: uid("lesson"),
            title: "새 강의",
            duration: "00:00",
            status: "검토 대기",
            youtubeUrl: "",
            materialUrl: ""
          }
        ]
      });
      saveAndRender();
      requestAnimationFrame(() => {
        const chapter = document.querySelector(`[data-chapter-id="${chapterId}"]`);
        chapter?.scrollIntoView({ behavior: "smooth", block: "center" });
        chapter?.querySelector(".chapter-title")?.focus();
      });
    }

    function addLesson(chapterId) {
      const chapter = state.course.chapters.find(item => item.id === chapterId);
      chapter.lessons.push({
        id: uid("lesson"),
        title: "새 강의",
        duration: "00:00",
        status: "검토 대기",
        youtubeUrl: "",
        materialUrl: ""
      });
      chapter.total = Math.max(Number(chapter.total || 0), chapter.lessons.length);
      saveAndRender();
    }

    function deleteChapter(chapterId) {
      state.course.chapters = state.course.chapters.filter(chapter => chapter.id !== chapterId);
      saveAndRender();
    }

    function deleteLesson(chapterId, lessonId) {
      const chapter = state.course.chapters.find(item => item.id === chapterId);
      chapter.lessons = chapter.lessons.filter(lesson => lesson.id !== lessonId);
      saveAndRender();
    }

    function setChapterField(chapterId, field, value) {
      const chapter = state.course.chapters.find(item => item.id === chapterId);
      chapter[field] = value;
      save();
    }

    function setLessonField(chapterId, lessonId, field, value) {
      const chapter = state.course.chapters.find(item => item.id === chapterId);
      const lesson = chapter.lessons.find(item => item.id === lessonId);
      lesson[field] = value;
      save();
      if (field === "duration") renderSummary();
      if (field === "status") render();
    }

    function youtubeEmbedUrl(url) {
      const raw = String(url || "").trim();
      if (!raw) return "";
      try {
        const parsed = new URL(raw);
        let id = "";
        if (parsed.hostname.includes("youtu.be")) id = parsed.pathname.replace("/", "");
        if (parsed.searchParams.get("v")) id = parsed.searchParams.get("v");
        if (parsed.pathname.includes("/shorts/")) id = parsed.pathname.split("/shorts/")[1].split("/")[0];
        if (parsed.pathname.includes("/embed/")) id = parsed.pathname.split("/embed/")[1].split("/")[0];
        return id ? `https://www.youtube.com/embed/${encodeURIComponent(id)}` : "";
      } catch {
        return "";
      }
    }

    function coursePageHtml() {
      const course = state.course;
      const lessons = allLessons();
      const tags = String(course.tags || "").split(",").map(tag => tag.trim()).filter(Boolean);
      return `<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>${escapeHtml(course.title)}</title>
  <style>
    :root { --ink:#151a21; --muted:#67707b; --line:#e5e8ec; --brand:#11695f; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:#f6f7f8; }
    .hero { background:#172825; color:#fff; padding:48px 20px 36px; }
    .wrap { width:min(1060px, calc(100% - 32px)); margin:0 auto; }
    h1 { margin:0; font-size:clamp(34px, 5vw, 62px); line-height:1.08; letter-spacing:0; }
    .hero p { color:#d6e3df; max-width:720px; line-height:1.7; font-size:17px; }
    .tags { display:flex; flex-wrap:wrap; gap:7px; margin:18px 0 0; }
    .tag { background:#e8f3f0; color:var(--brand); border-radius:999px; padding:6px 10px; font-weight:800; font-size:12px; display:inline-flex; }
    .stats { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:20px; max-width:560px; }
    .stats div { border:1px solid rgba(255,255,255,.17); border-radius:8px; padding:12px; background:rgba(255,255,255,.08); }
    .stats strong { display:block; font-size:24px; }
    main { padding:28px 0 48px; }
    .chapter { background:#fff; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:16px; }
    .chapter-head { padding:18px; border-bottom:1px solid var(--line); background:#fbfcfc; }
    .chapter h2 { margin:0; font-size:21px; letter-spacing:0; }
    .lesson { padding:18px; border-bottom:1px solid var(--line); }
    .lesson:last-child { border-bottom:0; }
    .lesson h3 { margin:0 0 10px; font-size:17px; letter-spacing:0; }
    .meta { color:var(--muted); display:flex; gap:8px; flex-wrap:wrap; font-size:13px; margin-bottom:12px; }
    iframe { width:100%; aspect-ratio:16/9; border:0; border-radius:8px; background:#111; }
    .empty { border:1px dashed #cbd0d7; border-radius:8px; padding:16px; color:var(--muted); }
    @media (max-width:640px) { .stats { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <h1>${escapeHtml(course.title)}</h1>
      <p>${escapeHtml(course.description)}</p>
      <div class="tags">
        <span class="tag">${escapeHtml(course.category)}</span>
        <span class="tag">${escapeHtml(course.level)}</span>
        ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
      </div>
      <div class="stats">
        <div><strong>${course.chapters.length}</strong><span>챕터</span></div>
        <div><strong>${lessons.length}</strong><span>강의</span></div>
        <div><strong>${formatDuration(totalMinutes())}</strong><span>총 학습 시간</span></div>
      </div>
    </div>
  </header>
  <main class="wrap">
    ${course.chapters.map((chapter, chapterIndex) => `
      <section class="chapter">
        <div class="chapter-head"><h2>${chapterIndex + 1}. ${escapeHtml(chapter.title)}</h2></div>
        ${chapter.lessons.map((lesson, lessonIndex) => {
          const embed = youtubeEmbedUrl(lesson.youtubeUrl);
          return `<article class="lesson">
            <h3>${lessonIndex + 1}. ${escapeHtml(lesson.title)}</h3>
            <div class="meta"><span>${escapeHtml(lesson.duration)}</span><span>${escapeHtml(lesson.status)}</span></div>
            ${embed ? `<iframe src="${embed}" title="${escapeHtml(lesson.title)}" allowfullscreen></iframe>` : `<div class="empty">유튜브 링크 입력 전입니다.</div>`}
          </article>`;
        }).join("")}
      </section>
    `).join("")}
  </main>
</body>
</html>`;
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportPage() {
      const filename = `${slugify(state.course.slug || state.course.title)}.html`;
      download(filename, coursePageHtml(), "text/html");
      showToast(`${filename} 생성 완료`);
    }

    function exportJson() {
      download("global-seller-course.json", JSON.stringify(state.course, null, 2), "application/json");
      showToast("JSON 내보내기 완료");
    }

    function importJson(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data.chapters)) throw new Error("Invalid course");
          state.course = data;
          saveAndRender();
          showToast("불러오기 완료");
        } catch {
          showToast("불러올 수 없는 JSON입니다.");
        }
      };
      reader.readAsText(file);
    }

    [
      ["courseTitle", "title"],
      ["categoryInput", "category"],
      ["levelInput", "level"],
      ["slugInput", "slug"],
      ["tagsInput", "tags"],
      ["hoursInput", "hours"],
      ["descriptionInput", "description"]
    ].forEach(([element, field]) => {
      els[element].addEventListener("input", (event) => updateCourseField(field, event.target.value));
      els[element].addEventListener("change", (event) => updateCourseField(field, event.target.value));
    });

    els.addChapterBtn.addEventListener("click", addChapter);
    els.addChapterBottomBtn.addEventListener("click", addChapter);
    els.exportPageBtn.addEventListener("click", exportPage);
    els.exportJsonBtn.addEventListener("click", exportJson);
    els.importBtn.addEventListener("click", () => els.fileInput.click());
    els.fileInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (file) importJson(file);
      event.target.value = "";
    });

    els.chapterList.addEventListener("input", (event) => {
      const chapterEl = event.target.closest("[data-chapter-id]");
      if (!chapterEl) return;
      const lessonEl = event.target.closest("[data-lesson-id]");
      if (lessonEl && event.target.dataset.lessonField) {
        setLessonField(chapterEl.dataset.chapterId, lessonEl.dataset.lessonId, event.target.dataset.lessonField, event.target.value);
      } else if (event.target.dataset.chapterField) {
        setChapterField(chapterEl.dataset.chapterId, event.target.dataset.chapterField, event.target.value);
      }
    });

    els.chapterList.addEventListener("change", (event) => {
      const chapterEl = event.target.closest("[data-chapter-id]");
      const lessonEl = event.target.closest("[data-lesson-id]");
      if (chapterEl && lessonEl && event.target.dataset.lessonField) {
        setLessonField(chapterEl.dataset.chapterId, lessonEl.dataset.lessonId, event.target.dataset.lessonField, event.target.value);
      }
    });

    els.chapterList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const chapterEl = button.closest("[data-chapter-id]");
      const lessonEl = button.closest("[data-lesson-id]");
      const chapterId = chapterEl?.dataset.chapterId || button.dataset.chapterId;
      if (button.dataset.action === "add-lesson") addLesson(chapterId);
      if (button.dataset.action === "delete-chapter") deleteChapter(chapterId);
    });

    render();
  </script>
</body>
</html>

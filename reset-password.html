<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>비밀번호 재설정 | Global Seller Hub</title>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css");

    :root {
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #151b20;
      --muted: #67717a;
      --line: #e1e7e4;
      --brand: #12675f;
      --brand-dark: #0d3f3b;
      font-family: "Pretendard Variable", Pretendard, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      padding: 24px;
      word-break: keep-all;
    }

    .panel {
      width: min(440px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 22px 58px rgba(22, 33, 40, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    p {
      margin: 10px 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 12px;
      color: var(--ink);
      font: inherit;
    }

    input:focus {
      outline: 2px solid rgba(18, 103, 95, 0.18);
      border-color: var(--brand);
    }

    button,
    .btn {
      min-height: 46px;
      border: 1px solid var(--brand-dark);
      border-radius: 10px;
      background: var(--brand-dark);
      color: #fff;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    button:disabled {
      opacity: .65;
      cursor: wait;
    }

    .notice {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #eaf3f0;
      color: var(--brand-dark);
      font-weight: 800;
      line-height: 1.55;
    }

    .notice.error {
      background: #fff1f0;
      color: #9f2f24;
    }

    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>비밀번호 재설정</h1>
    <p>새 비밀번호를 입력하면 계정 비밀번호가 변경됩니다.</p>

    <form id="resetForm">
      <label>새 비밀번호
        <input id="passwordInput" type="password" autocomplete="new-password" required minlength="6" placeholder="6자 이상">
      </label>
      <label>새 비밀번호 확인
        <input id="confirmInput" type="password" autocomplete="new-password" required minlength="6" placeholder="한 번 더 입력">
      </label>
      <button id="submitBtn" type="submit">비밀번호 변경</button>
    </form>

    <a class="btn" id="adminLink" href="admin.html" hidden>관리자 페이지로 이동</a>
    <div class="notice" id="notice">메일 링크 확인 중입니다.</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://sokyrudauodjkekahuvw.supabase.co";
    const supabasePublishableKey = "sb_publishable_ps7CqjUh-MJAWclht38fTA_PzqYn_rv";
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabasePublishableKey);
    const form = document.getElementById("resetForm");
    const passwordInput = document.getElementById("passwordInput");
    const confirmInput = document.getElementById("confirmInput");
    const submitBtn = document.getElementById("submitBtn");
    const notice = document.getElementById("notice");
    const adminLink = document.getElementById("adminLink");

    function setNotice(message, isError = false) {
      notice.textContent = message;
      notice.classList.toggle("error", isError);
    }

    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") {
        setNotice("새 비밀번호를 입력하세요.");
      }
    });

    async function ensureSession() {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        setNotice("새 비밀번호를 입력하세요.");
        return;
      }
      setNotice("재설정 메일의 링크로 접속해야 비밀번호를 바꿀 수 있습니다.", true);
      form.hidden = true;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const password = passwordInput.value;
      if (password !== confirmInput.value) {
        setNotice("비밀번호 확인이 일치하지 않습니다.", true);
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "변경 중...";
      const { error } = await supabaseClient.auth.updateUser({ password });
      submitBtn.disabled = false;
      submitBtn.textContent = "비밀번호 변경";

      if (error) {
        setNotice(error.message || "비밀번호를 변경하지 못했습니다.", true);
        return;
      }

      form.hidden = true;
      adminLink.hidden = false;
      setNotice("비밀번호가 변경되었습니다. 새 비밀번호로 로그인하세요.");
    });

    ensureSession();
  </script>
</body>
</html>
